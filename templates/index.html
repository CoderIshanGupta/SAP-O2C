<!DOCTYPE html>
<html>
<head>
    <title>SAP O2C Simulator</title>
</head>
<body>
    <h1>Order-to-Cash (O2C) Simulation</h1>

    <form action="/process" method="post">
        <label>Customer:</label>
        <input type="text" name="customer" value="CUST1001"><br><br>

        <label>Material:</label>

        <label>Quantity:</label>
        <input type="number" name="qty" value="100"><br><br>

        <button type="submit">Run O2C Process</button>
    </form>
</body>
</html>
